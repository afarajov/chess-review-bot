<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Log in — ChessLens</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

<header class="site-header">
  <div class="container">
    <a class="logo" href="index.html">
      <span class="logo-mark">♞</span> ChessLens <span class="beta">beta</span>
    </a>
    <nav class="main-nav">
      <a href="index.html">Analyze</a>
      <a href="profile.html">My games</a>
      <a href="about.html">About</a>
    </nav>
  </div>
</header>

<main class="auth-wrap">
  <div class="auth-card">
    <div class="auth-logo">
      <div class="logo-mark">♞</div>
    </div>
    <h2 id="auth-title">Welcome back</h2>
    <p class="auth-sub" id="auth-sub">Log in to save your reviews and link your accounts</p>

    <div class="tabs" id="auth-tabs">
      <button data-pane="login" class="active" onclick="setAuthTab('login')">Log in</button>
      <button data-pane="register" onclick="setAuthTab('register')">Sign up</button>
    </div>

    <form data-pane-of="auth-tabs" data-pane="login" onsubmit="event.preventDefault(); location.href='profile.html'">
      <div class="field">
        <label>Email</label>
        <input type="email" placeholder="you@example.com" required>
      </div>
      <div class="field">
        <label>Password</label>
        <input type="password" placeholder="••••••••" required>
      </div>
      <button class="btn btn-block btn-lg" type="submit">Log in</button>
      <p class="auth-foot"><a href="#">Forgot password?</a></p>
    </form>

    <form data-pane-of="auth-tabs" data-pane="register" style="display:none"
          onsubmit="event.preventDefault(); location.href='profile.html'">
      <div class="field">
        <label>Username</label>
        <input type="text" placeholder="What should we call you?" required>
      </div>
      <div class="field">
        <label>Email</label>
        <input type="email" placeholder="you@example.com" required>
      </div>
      <div class="field">
        <label>Password</label>
        <input type="password" placeholder="At least 8 characters" required>
      </div>
      <button class="btn btn-block btn-lg" type="submit">Create account</button>
      <p class="auth-foot">By signing up you agree to the <a href="#">terms</a>.</p>
    </form>

    <div class="auth-divider">or</div>
    <button class="btn btn-tg btn-block" onclick="location.href='profile.html'">
      ✈ Continue with Telegram
    </button>
  </div>
</main>

<script src="js/common.js"></script>
<script>
  function setAuthTab(name) {
    switchTab(document.getElementById("auth-tabs"), name);
    document.getElementById("auth-title").textContent =
      name === "login" ? "Welcome back" : "Create your account";
    document.getElementById("auth-sub").textContent =
      name === "login"
        ? "Log in to save your reviews and link your accounts"
        : "Review history, Chess.com and Lichess linking";
  }
  if (location.hash === "#register") setAuthTab("register");
</script>
</body>
</html>
